guava = "33.5.0-jre"
guice = "7.0.0"
graalvm = "25.0.2"
gradleNodePlugin = "7.1.0"
gradleToolingApi = "9.2.1"
hikariCP = "7.0.2"
jackson = "3.1.0"
jakartaCdiApi = "5.0.0-M1"
jakartaInjectApi = "2.0.1"
jedis = "7.4.0"
jetty = "12.1.7"
jspecify = "1.0.0"
junit = "5.10.2"
kotlinDsl = "5.2.0"
logback = "1.5.32"
mockito = "5.11.0"
neo4jDriver = "6.0.4"
nvWebsocketClient = "2.14"
postgresql = "42.7.10"
protobuf = "4.34.1"
protobufPlugin = "0.10.0"
shadow = "8.3.0"
slf4j = "2.0.17"
testcontainers = "2.0.4"
testcontainersRedis = "2.2.4"
wiremock = "3.13.2"

[libraries]
ampq-client = { module = "com.rabbitmq:amqp-client", version.ref = "amqpClient" }
assertj-core = { module = "org.assertj:assertj-core", version.ref = "assertj" }
bucket4j = { module = "com.bucket4j:bucket4j_jdk17-core", version.ref = "bucket4j" }
clazz-graph = { module = "io.github.classgraph:classgraph", version.ref = "clazzGraph" }
erlang-jinterface = { module = "org.erlang.otp:jinterface", version.ref = "erlangJinterface" }
guava = { module = "com.google.guava:guava", version.ref = "guava" }
guice = { module = "com.google.inject:guice", version.ref = "guice" }
graalvm-polyglot = { module = "org.graalvm.polyglot:polyglot", version.ref = "graalvm" }
graalvm-polyglot-js = { module = "org.graalvm.polyglot:js", version.ref = "graalvm" }
gradle-node-plugin = { module = "com.github.node-gradle:gradle-node-plugin", version.ref = "gradleNodePlugin" }
gradle-tooling-api = { module = "org.gradle:gradle-tooling-api", version.ref = "gradleToolingApi" }
hikari-cp = { module = "com.zaxxer:HikariCP", version.ref = "hikariCP" }
jackson-databind = { module = "tools.jackson.core:jackson-databind", version.ref = "jackson" }
jakarta-cdi-api = { module = "jakarta.enterprise:jakarta.enterprise.cdi-api", version.ref = "jakartaCdiApi" }
jakarta-inject-api = { module = "jakarta.inject:jakarta.inject-api", version.ref = "jakartaInjectApi" }
